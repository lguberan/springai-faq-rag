image: maven:3.9-eclipse-temurin-25

stages:
  - build
  - test
  - docker
  - deploy

variables:
  DOCKER_HOST: tcp://docker:2375/
  DOCKER_TLS_CERTDIR: ""
  DOCKER_DRIVER: overlay2
  ARTIFACTORY_REPO: http://artifactory.local:8081
  IMAGE_NAME: ${ARTIFACTORY_REPO}/springai-faq-rag

services:
  - docker:dind

cache:
  paths:
    - .m2/repository

before_script:
  - export VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)

build:
  stage: build
  script:
    - mvn -Dmaven.repo.local=.m2/repository clean package -DskipTests

test:
  stage: test
  script:
    - mvn -Dmaven.repo.local=.m2/repository test
  artifacts:
    when: always
    reports:
      junit: target/surefire-reports/*.xml

docker-build:
  stage: docker
  script:
    - docker build -t $IMAGE_NAME:$VERSION .
    - echo $CI_REGISTRY_PASSWORD | docker login $ARTIFACTORY_REPO -u $CI_REGISTRY_USER --password-stdin
    - docker push $IMAGE_NAME:$VERSION
    - docker tag $IMAGE_NAME:$VERSION $IMAGE_NAME:latest
    - docker push $IMAGE_NAME:latest

deploy:
  stage: deploy
  script:
    - apk add --no-cache openssh-client
    - ssh -o StrictHostKeyChecking=no user@your-nas-ip 'cd /docker/springai-faq-rag && docker-compose pull && docker-compose up -d'
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'