spring:
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
  datasource:
    hikari:
      minimumIdle: 2
      maximumPoolSize: 10
      idleTimeout: 1000
      connectionTimeout: 1000
      leakDetectionThreshold: 1000
  test:
    print-condition-evaluation-report: false

debug: false

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.boot.autoconfigure: INFO